<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Fleet Pulse</title>
    <!-- Include Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Include Inter font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("loginForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
            const res = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                alert(data.message || "Invalid login credentials");
                return;
            }

            // Store token
            localStorage.setItem("token", data.token);
            
            // Store user info
            localStorage.setItem("user", JSON.stringify(data.user));
            
            // Store profile data for fast loading
            if (data.profile) {
                localStorage.setItem("userProfile", JSON.stringify(data.profile));
            }

            alert("Login successful!");
            window.location.href = "../Dashboard.html";

        } catch (err) {
            console.error(err);
            alert("Something went wrong. Try again.");
        }
    });
});
</script>

</head>
<body class="bg-gray-100">
    <div class="flex min-h-screen items-center justify-center p-4">
        <div class="bg-white p-8 sm:p-10 rounded-2xl shadow-lg max-w-sm w-full">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-blue-600">Fleet Pulse</h1>
                <p class="text-gray-500 mt-2">Welcome back! Please sign in.</p>
            </div>
            
            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input type="email" id="email" name="email" required
                           class="mt-1 block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                
                <div>
                    <div class="flex justify-between items-center">
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <a href="#" class="text-sm text-blue-600 hover:underline">Forgot password?</a>
                    </div>
                    <input type="password" id="password" name="password" required
                           class="mt-1 block w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                
                <div>
                    <button type="submit"
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        Sign In
                    </button>
                </div>
            </form>

            <p class="text-center text-sm text-gray-600 mt-8">
                Don't have an account? 
                <a href="../sign-up.html" class="font-medium text-blue-600 hover:underline">Sign up</a>
            </p>
            <p class="text-center text-sm text-gray-600 mt-4">
                <a href="../index.html" class="font-medium text-gray-500 hover:text-blue-600 hover:underline">
                    &larr; Back to Home
                </a>
            </p>
        </div>
    </div>
</body>
</html>

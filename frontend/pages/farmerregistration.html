<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farmer Registration</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
}

.gradient-bg {
    background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    position: relative;
}

.gradient-bg::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
    z-index: 0;
}

.content-wrapper {
    position: relative;
    z-index: 1;
}

.input {
    width: 100%;
    padding: 10px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
}

.input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 5px rgba(59,130,246,0.4);
}

.btn-primary {
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
}
.btn-primary:hover {
    background: linear-gradient(135deg, #1d4ed8, #1e40af);
}
</style>
</head>

<body class="gradient-bg min-h-screen">

<!-- HEADER -->
<header class="bg-white shadow sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">

    <h1 class="text-lg font-bold text-blue-700">🚜 Farmer Module</h1>

    <button onclick="goBack()" 
      class="text-blue-600 font-semibold hover:underline">
      ← Back to Dashboard
    </button>

  </div>
</header>

<!-- MAIN -->
<main class="content-wrapper flex justify-center items-center py-10 px-4">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-xl">

    <h2 class="text-2xl font-bold text-center text-blue-700 mb-6">
      Farmer Registration
    </h2>

    <form id="farmerForm" class="space-y-4">

      <h3 class="text-blue-600 font-semibold border-b pb-1">Farmer Details</h3>

      <input type="text" id="farmerName" placeholder="Full Name" class="input" required>
      <input type="tel" id="contact" placeholder="Contact Number" class="input" required>
      <input type="text" id="address" placeholder="Address" class="input" required>
      <input type="text" id="farmLocation" placeholder="Farm Location" class="input" required>

      <h3 class="text-blue-600 font-semibold border-b pb-1 mt-4">Product Details</h3>

      <input type="text" id="productName" placeholder="Product Name" class="input" required>

      <select id="category" class="input" required>
        <option value="">Select Category</option>
        <option>Perishable</option>
        <option>Non-Perishable</option>
      </select>

      <button type="submit" class="btn-primary text-white w-full py-2 rounded-lg font-semibold mt-3">
        Register Farmer
      </button>

    </form>

  </div>

</main>

<script>

// 🔙 BACK BUTTON
function goBack() {
  window.location.href = "farmer-dashboard.html";
}

// SUBMIT FORM
document.getElementById("farmerForm").addEventListener("submit", async function (e) {
  e.preventDefault();

  const nameInput = document.getElementById("farmerName");
  const contactInput = document.getElementById("contact");
  const addressInput = document.getElementById("address");
  const locationInput = document.getElementById("farmLocation");
  const productInput = document.getElementById("productName");
  const categoryInput = document.getElementById("category");

  const data = {
    name: nameInput.value.trim(),
    contact: contactInput.value.trim(),
    address: addressInput.value.trim(),
    location: locationInput.value.trim(),
    product: productInput.value.trim(),
    category: categoryInput.value
  };

  try {
    const res = await fetch("/api/farmer/add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    if (!res.ok) {
      alert("Failed to save");
      return;
    }

    alert("✅ Farmer added successfully");

    window.location.href = "farmer-dashboard.html";

  } catch (err) {
    console.error(err);
    alert("Error occurred");
  }
});

</script>

</body>
</html>

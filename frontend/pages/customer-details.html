<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Ledger</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-slate-100 via-gray-100 to-blue-50 min-h-screen">

<!-- MAIN -->
<div class="max-w-7xl mx-auto px-4 py-8">

    <!-- TOP HERO -->
    <div class="bg-gradient-to-r from-blue-700 via-indigo-700 to-purple-700 rounded-[32px] shadow-2xl overflow-hidden mb-8">

        <div class="p-8 md:p-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-8">

            <!-- LEFT -->
            <div class="flex items-center gap-6">

                <!-- AVATAR -->
                <div class="h-24 w-24 rounded-full bg-white/20 backdrop-blur-lg border border-white/30 flex items-center justify-center text-5xl font-bold text-white shadow-lg">

                    <span id="customerInitial">

                        A

                    </span>

                </div>

                <!-- INFO -->
                <div>

                    <h1 id="customerName"
                    class="text-4xl md:text-5xl font-bold text-white tracking-tight">
                    </h1>

                    <p id="customerPhone"
                    class="text-blue-100 text-lg mt-3">
                    </p>

                    <div class="mt-4">

                        <span class="bg-white/20 text-white px-4 py-2 rounded-full text-sm font-medium">

                            Ledger Account

                        </span>

                    </div>

                </div>

            </div>

            <!-- RIGHT -->
            <div class="flex flex-col items-end gap-4">

                <!-- NET BALANCE -->
                <div class="bg-white/15 backdrop-blur-lg border border-white/20 rounded-3xl px-8 py-6 text-right shadow-xl min-w-[280px]">

                    <p class="text-blue-100 text-sm uppercase tracking-widest font-semibold">

                        Net Balance

                    </p>

                    <h2 id="netBalance"
                    class="text-4xl font-bold mt-3 text-white">

                        ₹0

                    </h2>

                </div>

                <!-- BUTTONS -->
                <div class="flex gap-3">

                    <button
                    onclick="downloadPDF()"
                    class="bg-white text-blue-700 hover:bg-blue-50 transition-all duration-300 px-5 py-3 rounded-2xl font-semibold shadow-lg">

                        Download PDF

                    </button>

                    <button
                    onclick="goBack()"
                    class="bg-black/20 hover:bg-black/30 transition-all duration-300 text-white px-5 py-3 rounded-2xl font-semibold">

                        Back

                    </button>

                </div>

            </div>

        </div>

    </div>



    <!-- ADD ENTRY -->
    <div class="bg-white rounded-[32px] shadow-xl border border-gray-100 p-8 mb-8">

        <!-- TITLE -->
        <div class="flex justify-between items-center mb-8">

            <div>

                <h2 class="text-3xl font-bold text-gray-800">

                    Add Transaction

                </h2>

                <p class="text-gray-500 mt-2">

                    Record payments and balance updates

                </p>

            </div>

            <div class="hidden md:block">

                <div class="bg-blue-50 text-blue-700 px-4 py-2 rounded-xl font-semibold">

                    KhataBook Ledger

                </div>

            </div>

        </div>

        <!-- FORM -->
        <div class="grid md:grid-cols-4 gap-5">

            <!-- AMOUNT -->
            <div>

                <label class="block text-gray-600 font-semibold mb-2">

                    Amount

                </label>

                <input
                type="number"
                id="amount"
                placeholder="₹ Enter Amount"
                class="w-full bg-gray-50 border-2 border-gray-200 focus:border-blue-500 focus:bg-white transition-all p-4 rounded-2xl outline-none text-xl font-semibold">

            </div>

            <!-- TYPE -->
            <div>

                <label class="block text-gray-600 font-semibold mb-2">

                    Transaction Type

                </label>

                <select
                id="entryType"
                class="w-full bg-gray-50 border-2 border-gray-200 focus:border-blue-500 focus:bg-white transition-all p-4 rounded-2xl outline-none text-lg">

                    <option value="gave">

                        You Gave

                    </option>

                    <option value="got">

                        You Got

                    </option>

                </select>

            </div>

            <!-- DETAILS -->
            <div>

                <label class="block text-gray-600 font-semibold mb-2">

                    Notes

                </label>

                <input
                type="text"
                id="details"
                placeholder="Transaction details"
                class="w-full bg-gray-50 border-2 border-gray-200 focus:border-blue-500 focus:bg-white transition-all p-4 rounded-2xl outline-none">

            </div>

            <!-- BUTTON -->
            <div class="flex items-end">

                <button
                onclick="addEntry()"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 hover:scale-[1.02] active:scale-100 transition-all duration-300 text-white py-4 rounded-2xl text-lg font-bold shadow-xl">

                    Save Entry

                </button>

            </div>

        </div>

    </div>



    <!-- TRANSACTIONS -->
    <div class="bg-white rounded-[32px] shadow-2xl overflow-hidden border border-gray-100">

        <!-- HEADER -->
        <div class="bg-gradient-to-r from-gray-50 to-blue-50 border-b px-8 py-6">

            <div class="grid grid-cols-4 text-gray-600 font-bold text-lg">

                <div>

                    Date & Details

                </div>

                <div class="text-center text-red-500">

                    You Gave

                </div>

                <div class="text-center text-green-500">

                    You Got

                </div>

                <div class="text-right">

                    Balance

                </div>

            </div>

        </div>

        <!-- TRANSACTION LIST -->
        <div id="transactionList">

        </div>

    </div>

</div>




<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const params =
    new URLSearchParams(window.location.search);

const customerId =
    params.get("id");

let customer;
let transactions = [];



// ================= LOAD CUSTOMER =================
async function loadCustomer() {

    try {

        const res = await fetch(
            `/api/customer/${customerId}`
        );

        customer = await res.json();

        document.getElementById("customerName")
            .innerText = customer.name;

        document.getElementById("customerInitial")
            .innerText =
                customer.name.charAt(0);

        document.getElementById("customerPhone")
            .innerText =
                customer.phone || "No Phone";

        loadTransactions();

    } catch(err) {

        console.error(err);

        alert("Failed to load customer");
    }
}



// ================= LOAD TRANSACTIONS =================
async function loadTransactions() {

    try {

        const res = await fetch(
            `/api/transaction/${customerId}`
        );

        transactions = await res.json();

        renderTransactions();

    } catch(err) {

        console.error(err);
    }
}



// ================= RENDER TRANSACTIONS =================
function renderTransactions() {

    const list =
        document.getElementById("transactionList");

    list.innerHTML = "";



    // ================= OPENING BALANCE =================
    const openingBalance =
        Number(customer.openingBalance || 0);

    let totalGive =
        customer.balanceType === "gave"
        ? openingBalance
        : 0;

    let totalGet =
        customer.balanceType === "got"
        ? openingBalance
        : 0;



    // ================= RUNNING BALANCE =================
    let runningBalance =
    totalGive - totalGet;



    



    // ================= TRANSACTIONS =================
    [...transactions]
.reverse()
.forEach(t => {

        // CALCULATIONS
        if (t.type === "gave") {

    // CUSTOMER HAS TO GIVE YOU
    totalGive += Number(t.amount);

    runningBalance += Number(t.amount);

} else {

    // CUSTOMER PAID YOU
    totalGet += Number(t.amount);

    runningBalance -= Number(t.amount);
}

        list.innerHTML += `

        <div class="grid grid-cols-4 p-5 border-b items-center hover:bg-gray-50 transition">

            <!-- DATE -->
            <div>

                <h3 class="font-bold text-lg text-gray-800">

                    ${new Date(t.createdAt)
                        .toLocaleString()}

                </h3>

                <p class="text-gray-500 mt-1">

                    ${t.details || "Transaction"}

                </p>

                <p class="text-gray-400 text-sm mt-1">

                    Balance:
                    ₹${Math.abs(runningBalance)
                        .toLocaleString("en-IN")}

                </p>

            </div>

            <!-- YOU GAVE -->
            <div class="text-center">

                ${
                    t.type === "gave"

                    ? `<h2 class="text-red-500 text-2xl font-bold">
                        ₹${Number(t.amount)
                            .toLocaleString("en-IN")}
                      </h2>`

                    : `<span class="text-gray-300 text-2xl">
                        -
                       </span>`
                }

            </div>

            <!-- YOU GOT -->
            <div class="text-center">

                ${
                    t.type === "got"

                    ? `<h2 class="text-green-500 text-2xl font-bold">
                        ₹${Number(t.amount)
                            .toLocaleString("en-IN")}
                      </h2>`

                    : `<span class="text-gray-300 text-2xl">
                        -
                       </span>`
                }

            </div>

            <!-- BALANCE -->
            <div class="text-right font-bold text-xl">

                ${
                    runningBalance < 0

                    ? `<span class="text-red-500">
                        -₹${Math.abs(runningBalance)
                            .toLocaleString("en-IN")}
                       </span>`

                    : runningBalance > 0

                    ? `<span class="text-green-500">
                        ₹${Math.abs(runningBalance)
                            .toLocaleString("en-IN")}
                       </span>`

                    : `<span class="text-gray-500">
                        ₹0
                       </span>`
                }

            </div>

        </div>
        `;
    });

    // ================= OPENING ENTRY =================
    if (openingBalance > 0) {

        list.innerHTML += `

        <div class="grid grid-cols-4 p-5 border-b items-center bg-gray-50">

            <!-- DATE -->
            <div>

                <h3 class="font-bold text-lg">

                    Opening Balance

                </h3>

                <p class="text-gray-400 text-sm mt-1">

                    ${new Date(customer.createdAt)
                        .toLocaleDateString()}

                </p>

            </div>

            <!-- YOU GAVE -->
            <div class="text-center">

                ${
                    customer.balanceType === "gave"

                    ? `<h2 class="text-red-500 text-2xl font-bold">
                        ₹${openingBalance
                            .toLocaleString("en-IN")}
                      </h2>`

                    : "-"
                }

            </div>

            <!-- YOU GOT -->
            <div class="text-center">

                ${
                    customer.balanceType === "got"

                    ? `<h2 class="text-green-500 text-2xl font-bold">
                        ₹${openingBalance
                            .toLocaleString("en-IN")}
                      </h2>`

                    : "-"
                }

            </div>

            <!-- BALANCE -->
            <div class="text-right font-bold text-xl">

                ${
                    runningBalance < 0

                    ? `<span class="text-red-500">
                        -₹${Math.abs(runningBalance)
                            .toLocaleString("en-IN")}
                       </span>`

                    : `<span class="text-green-500">
                        ₹${Math.abs(runningBalance)
                            .toLocaleString("en-IN")}
                       </span>`
                }

            </div>

        </div>
        `;
    }



    // ================= NET BALANCE =================
    const net =
    totalGive - totalGet;

    const netElement =
        document.getElementById("netBalance");



    // NEGATIVE = YOU'LL GIVE
    if (net < 0) {

        netElement.innerHTML = `

            <div class="text-right">

                <p class="text-red-200 text-sm uppercase tracking-widest">

                    You'll Give

                </p>

                <h2 class="text-red-400 text-5xl font-bold mt-2">

                    ₹${Math.abs(net)
                        .toLocaleString("en-IN")}

                </h2>

            </div>
        `;



    // POSITIVE = YOU'LL GET
    } else if (net > 0) {

        netElement.innerHTML = `

            <div class="text-right">

                <p class="text-green-200 text-sm uppercase tracking-widest">

                    You'll Get

                </p>

                <h2 class="text-green-400 text-5xl font-bold mt-2">

                    ₹${Math.abs(net)
                        .toLocaleString("en-IN")}

                </h2>

            </div>
        `;



    // ZERO = SETTLED
    } else {

        netElement.innerHTML = `

            <div class="text-right">

                <p class="text-gray-300 text-sm uppercase tracking-widest">

                    Settled

                </p>

                <h2 class="text-white text-5xl font-bold mt-2">

                    ₹0

                </h2>

            </div>
        `;
    }

}



// ================= ADD ENTRY =================
async function addEntry() {

    const amount =
        document.getElementById("amount").value;

    const type =
        document.getElementById("entryType").value;

    const details =
        document.getElementById("details").value;

    if (!amount) {

        alert("Enter amount");

        return;
    }

    try {

        await fetch(

            "/api/transaction/add",

            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    customerId,
                    amount,
                    type,
                    details
                })
            }
        );

        document.getElementById("amount").value = "";
        document.getElementById("details").value = "";

        loadTransactions();

    } catch(err) {

        console.error(err);

        alert("Failed to save");
    }
}



// ================= DOWNLOAD PDF =================
async function downloadPDF() {

    const element =
        document.body;

    const canvas =
        await html2canvas(element);

    const img =
        canvas.toDataURL("image/png");

    const { jsPDF } =
        window.jspdf;

    const pdf =
        new jsPDF();

    pdf.addImage(
        img,
        'PNG',
        0,
        0,
        210,
        297
    );

    pdf.save("statement.pdf");
}



// ================= BACK =================
function goBack() {

    window.location.href =
        "khata.html";
}



// ================= INIT =================
loadCustomer();

</script>   

</body>
</html>

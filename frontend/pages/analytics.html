<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FleetPulse Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#edf2f7;
}

/* ================= HEADER ================= */

.header{

height:90px;

background:#234d7c;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 40px;

color:white;

box-shadow:0 5px 15px rgba(0,0,0,.2);

}

.header-left{

display:flex;

align-items:center;

gap:18px;

}

.logo{

width:55px;

height:55px;

background:white;

color:#234d7c;

border-radius:12px;

display:flex;

justify-content:center;

align-items:center;

font-size:28px;

font-weight:bold;

}

.header h1{

font-size:38px;

font-weight:700;

}

.header-right img{

width:70px;

height:70px;

border-radius:10px;

background:white;

padding:5px;

}

/* ================= MAIN ================= */

.container{

width:95%;

margin:30px auto;

}

/* ================= CHARTS ================= */

.chart-row{

display:grid;

grid-template-columns:2fr 1fr;

gap:25px;

margin-bottom:25px;

}

.chart-card{

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.chart-card h2{

text-align:center;

font-size:34px;

margin-bottom:20px;

color:#222;

font-weight:600;

}

.chart-card canvas{

width:100% !important;

height:420px !important;

}

/* ================= STATS ================= */

.stats{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:25px;

margin-top:20px;

}

.card{

background:white;

border-radius:15px;

overflow:hidden;

box-shadow:0 10px 20px rgba(0,0,0,.08);

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}

.topBlue{

height:12px;

background:#2b6cb0;

}

.topGreen{

height:12px;

background:#14967f;

}

.topDark{

height:12px;

background:#2f855a;

}

.topOrange{

height:12px;

background:#dd6b20;

}

.card-body{

padding:35px;

text-align:center;

}

.card-body h1{

font-size:52px;

font-weight:700;

margin-bottom:10px;

}

.card-body p{

font-size:22px;

color:#555;

}

.blue{

color:#2b6cb0;

}

.green{

color:#14967f;

}

.dark{

color:#2f855a;

}

.orange{

color:#dd6b20;

}

/* ================= TABLE ================= */

.table-card{

margin-top:30px;

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.table-card h2{

margin-bottom:20px;

}

table{

width:100%;

border-collapse:collapse;

}

table th{

background:#234d7c;

color:white;

padding:14px;

}

table td{

padding:14px;

border-bottom:1px solid #ddd;

text-align:center;

}

table tr:hover{

background:#f7f7f7;

}

/* ================= RESPONSIVE ================= */

@media(max-width:1000px){

.chart-row{

grid-template-columns:1fr;

}

.stats{

grid-template-columns:repeat(2,1fr);

}

}

@media(max-width:700px){

.header{

padding:20px;

height:auto;

flex-direction:column;

gap:15px;

}

.header h1{

font-size:28px;

text-align:center;

}

.stats{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="header">

<div class="header-left">

<div class="logo">
🚛
</div>

<h1>FleetPulse Analytics Dashboard</h1>

</div>

<div class="header-right">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

</div>

</div>

<div class="container">

<div class="chart-row">

<div class="chart-card">

<h2>Monthly Trip Volume (2026)</h2>

<canvas id="tripChart"></canvas>

</div>

<div class="chart-card">

<h2>Fleet Distribution</h2>

<canvas id="pieChart"></canvas>

</div>

</div>

<div class="stats">

<div class="card">

<div class="topBlue"></div>

<div class="card-body">

<h1 class="blue" id="vehicles">0</h1>

<p>Total Vehicles</p>

</div>

</div>

<div class="card">

<div class="topGreen"></div>

<div class="card-body">

<h1 class="green" id="drivers">0</h1>

<p>Total Drivers</p>

</div>

</div>

<div class="card">

<div class="topDark"></div>

<div class="card-body">

<h1 class="dark" id="trips">0</h1>

<p>Total Trips</p>

</div>

</div>

<div class="card">

<div class="topOrange"></div>

<div class="card-body">

<h1 class="orange" id="maintenance">0</h1>

<p>Maintenance Due</p>

</div>

</div>

</div>

<div class="table-card">

<h2>Recent Fleet Activity</h2>

<table>

<thead>

<tr>

<th>Vehicle</th>

<th>Driver</th>

<th>Status</th>

<th>Date</th>

</tr>

</thead>

<tbody id="activityTable">

</tbody>

</table>

</div>

</div>
<script>

let dashboardData = null;

async function loadDashboard() {

    try {

        // Change this URL if your backend is hosted separately
        const response = await fetch("/api/dashboard");

        if (!response.ok) {
            throw new Error("Unable to fetch dashboard data");
        }

        dashboardData = await response.json();

        // =============================
        // Update Cards
        // =============================

        document.getElementById("vehicles").innerText =
            dashboardData.totalVehicles || 0;

        document.getElementById("drivers").innerText =
            dashboardData.totalDrivers || 0;

        document.getElementById("trips").innerText =
            dashboardData.totalTrips || 0;

        document.getElementById("maintenance").innerText =
            dashboardData.maintenanceDue || 0;

        loadBarChart();
        loadPieChart();
        loadRecentActivity();

    }

    catch (err) {

        console.error(err);

        alert("Dashboard data could not be loaded.");

    }

}


// =============================
// Monthly Trip Chart
// =============================

function loadBarChart() {

    const ctx = document.getElementById("tripChart");

    new Chart(ctx, {

        type: "bar",

        data: {

            labels: [
                "Jan",
                "Feb",
                "Mar",
                "Apr",
                "May",
                "Jun",
                "Jul",
                "Aug",
                "Sep",
                "Oct",
                "Nov",
                "Dec"
            ],

            datasets: [{

                label: "Trips",

                data: dashboardData.monthlyTrips || [
                    35,
                    48,
                    56,
                    62,
                    78,
                    85,
                    94,
                    88,
                    73,
                    96,
                    104,
                    118
                ],

                backgroundColor: "#2b6cb0",

                borderRadius: 8

            }]

        },

        options: {

            responsive: true,

            plugins: {

                legend: {
                    display: false
                }

            },

            scales: {

                y: {

                    beginAtZero: true

                }

            }

        }

    });

}


// =============================
// Pie Chart
// =============================

function loadPieChart() {

    const ctx = document.getElementById("pieChart");

    new Chart(ctx, {

        type: "pie",

        data: {

            labels: [

                "Vehicles",

                "Drivers",

                "Trips",

                "Maintenance"

            ],

            datasets: [{

                data: [

                    dashboardData.totalVehicles || 0,

                    dashboardData.totalDrivers || 0,

                    dashboardData.totalTrips || 0,

                    dashboardData.maintenanceDue || 0

                ],

                backgroundColor: [

                    "#2b6cb0",

                    "#14967f",

                    "#2f855a",

                    "#dd6b20"

                ]

            }]

        },

        options: {

            responsive: true

        }

    });

}


// =============================
// Recent Activity Table
// =============================

function loadRecentActivity() {

    const tbody = document.getElementById("activityTable");

    tbody.innerHTML = "";

    const activities = dashboardData.activities || [

        {
            vehicle: "MH12AB1234",
            driver: "Jatin Mali",
            status: "Completed",
            date: "2026-06-30"
        },

        {
            vehicle: "MH14XY7654",
            driver: "Prashant Mali",
            status: "Running",
            date: "2026-06-29"
        },

        {
            vehicle: "MH20CD9988",
            driver: "Aditya",
            status: "Maintenance",
            date: "2026-06-28"
        }

    ];

    activities.forEach(activity => {

        tbody.innerHTML += `

        <tr>

            <td>${activity.vehicle}</td>

            <td>${activity.driver}</td>

            <td>${activity.status}</td>

            <td>${activity.date}</td>

        </tr>

        `;

    });

}

loadDashboard();

</script>

</body>
</html>

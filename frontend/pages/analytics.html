<!DOCTYPE html>
<html>
<head>
    <title>AgriFleet Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            font-family:Arial;
            background:#f5f5f5;
            padding:30px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
            margin-bottom:30px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
            text-align:center;
        }

        h2{
            color:#2e7d32;
        }

        canvas{
            background:white;
            padding:20px;
            border-radius:15px;
        }

    </style>

</head>

<body>

<h1>Fleet Analytics Dashboard</h1>

<div class="cards">

<div class="card">
<h2 id="vehicles">0</h2>
<p>Total Vehicles</p>
</div>

<div class="card">
<h2 id="drivers">0</h2>
<p>Drivers</p>
</div>

<div class="card">
<h2 id="trips">0</h2>
<p>Trips</p>
</div>

<div class="card">
<h2 id="maintenance">0</h2>
<p>Maintenance Due</p>
</div>

</div>

<canvas id="chart"></canvas>

<script>

async function loadDashboard(){

const res=await fetch("http://localhost:5000/api/dashboard");

const data=await res.json();

document.getElementById("vehicles").innerHTML=data.totalVehicles;

document.getElementById("drivers").innerHTML=data.totalDrivers;

document.getElementById("trips").innerHTML=data.totalTrips;

document.getElementById("maintenance").innerHTML=data.maintenanceDue;

new Chart(document.getElementById("chart"),{

type:"bar",

data:{

labels:["Vehicles","Drivers","Trips","Maintenance"],

datasets:[{

label:"Fleet Report",

data:[
data.totalVehicles,
data.totalDrivers,
data.totalTrips,
data.maintenanceDue
]

}]

}

});

}

loadDashboard();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Fleet Pulse</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Inter',sans-serif;
            background:#f3f4f6;
        }

        input,select,textarea{
            transition:.2s;
        }

        input:focus,
        select:focus,
        textarea:focus{
            outline:none;
            border-color:#2563eb;
            box-shadow:0 0 0 3px rgba(37,99,235,.2);
        }
    </style>
</head>

<body>

<div class="min-h-screen flex items-center justify-center p-6">

<div class="bg-white rounded-2xl shadow-xl w-full max-w-xl p-8">

<div class="text-center mb-8">
<h1 class="text-3xl font-bold text-blue-600">Fleet Pulse</h1>
<p class="text-gray-500 mt-2">
Create your account to get started.
</p>
</div>

<form id="signupForm" class="space-y-5">

<div>
<label class="block text-sm font-medium text-gray-700">
Full Name
</label>

<input
type="text"
id="fullName"
required
class="mt-1 w-full border rounded-lg px-3 py-2">
</div>

<div>
<label class="block text-sm font-medium text-gray-700">
Email Address
</label>

<input
type="email"
id="email"
required
class="mt-1 w-full border rounded-lg px-3 py-2">
</div>

<div>
<label class="block text-sm font-medium text-gray-700">
Phone Number
</label>

<input
type="tel"
id="phone"
required
placeholder="9876543210"
class="mt-1 w-full border rounded-lg px-3 py-2">
</div>

<div>
<label class="block text-sm font-medium text-gray-700">
Role
</label>

<select
id="role"
required
class="mt-1 w-full border rounded-lg px-3 py-2">

<option value="">Select Role</option>

<option value="Admin">
Admin
</option>

<option value="Fleet Manager">
Fleet Manager
</option>

<option value="Dispatcher">
Dispatcher
</option>

<option value="Driver">
Driver
</option>

<option value="Supervisor">
Supervisor
</option>

</select>

</div>

<div>
<label class="block text-sm font-medium text-gray-700">
Company Name
</label>

<input
type="text"
id="company"
placeholder="ABC Logistics Pvt Ltd"
class="mt-1 w-full border rounded-lg px-3 py-2">
</div>

<div>
<label class="block text-sm font-medium text-gray-700">
Address
</label>

<textarea
id="address"
rows="3"
placeholder="Enter your address"
class="mt-1 w-full border rounded-lg px-3 py-2"></textarea>

</div>

<div>
<label class="block text-sm font-medium text-gray-700">
Password
</label>

<input
type="password"
id="password"
required
class="mt-1 w-full border rounded-lg px-3 py-2">
</div>

<div>
<label class="block text-sm font-medium text-gray-700">
Confirm Password
</label>

<input
type="password"
id="confirmPassword"
required
class="mt-1 w-full border rounded-lg px-3 py-2">
</div>

<div>

<button
type="submit"
class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold">

Create Account

</button>

</div>

</form>

<p class="text-center mt-6 text-sm">

Already have an account?

<a href="../sign-in.html"
class="text-blue-600 font-semibold hover:underline">

Sign In

</a>

</p>

</div>

</div>
<script>
document.addEventListener("DOMContentLoaded", () => {

    const signupForm = document.getElementById("signupForm");

    signupForm.addEventListener("submit", async function (e) {

        e.preventDefault();

        const fullName = document.getElementById("fullName").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const role = document.getElementById("role").value;
        const company = document.getElementById("company").value.trim();
        const address = document.getElementById("address").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (
            !fullName ||
            !email ||
            !phone ||
            !role ||
            !password ||
            !confirmPassword
        ) {
            alert("Please fill all required fields.");
            return;
        }

        if (password !== confirmPassword) {
            alert("Passwords do not match.");
            return;
        }

        const payload = {
            name: fullName,
            email: email,
            phone: phone,
            role: role,
            company: company,
            address: address,
            password: password
        };

        try {

            const response = await fetch("/api/auth/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                alert(data.message || "Registration Failed");
                return;
            }

            // Save Login Token
            localStorage.setItem("token", data.token);

            // Save User
            localStorage.setItem("user", JSON.stringify(data.user));

            // Save Profile for fast loading
            if (data.profile) {
                localStorage.setItem("userProfile", JSON.stringify(data.profile));
            }

            alert("Registration Successful!");

            window.location.href = "profile.html";

        }
        catch (error) {

            console.error(error);

            alert("Server Error. Please try again.");

        }

    });

});
</script>

<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vakratunda Vegetable Co. — Billing System (Clean, No Pre-Fill)</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper-w: 850px;
      --paper-h: 1100px;
      --margin: 28px;
      --accent: #c91f4b;
      --line: #d8d8d8;
    }
    body { font-family: 'Inter', sans-serif; }

    #printRoot { display:none; }
    .page {
      width: var(--paper-w);
      min-height: var(--paper-h);
      background: #fff;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      padding: var(--margin);
      box-sizing: border-box;
      page-break-after: always;
    }
    .header { text-align:center; margin-bottom:6px; }
    .company { font-size:28px; color:var(--accent); font-weight:800; }
    .sub { font-size:13px; color:#666; margin-top:2px; }

    .meta { display:flex; justify-content:space-between; margin:6px 0 10px; font-size:14px; }
    .carry { margin:6px 0 10px; font-weight:700; color:#c33; }

    table.receipt { width:100%; border-collapse:collapse; font-size:15px; }
    table.receipt th, table.receipt td {
      border:1px solid var(--line);
      padding:8px 6px;
      text-align:center;
    }
    table.receipt th { background:linear-gradient(#fff,#fafafa); font-weight:700; }
    table.receipt .total-row td { font-weight:700; border-top:2px solid #ccc; }

    .footer-line { margin-top:30px; display:flex; justify-content:space-between; font-size:14px; color:#444; }

    @media print {
      #appShell { display:none !important; }
      #printRoot { display:block !important; }
      .page { box-shadow:none !important; margin:0 !important; }
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-800">

  <div id="appShell" class="container mx-auto p-6 max-w-5xl">
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900">वक्रतुंड व्हेजिटेबल कंपनी</h1>
        <p class="text-sm text-gray-500">Vakratunda Vegetable Company</p>
        <p class="text-sm text-gray-500">Billing System</p>
      </div>

      <form id="billForm" class="space-y-8">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 border-b pb-8">
          <div><label>Receipt No.</label><input id="receiptNo" type="text" class="w-full border rounded-lg p-2.5 bg-gray-50"></div>
          <div><label>Gate No.</label><input id="gateNo" type="text" class="w-full border rounded-lg p-2.5 bg-gray-50"></div>
          <div><label>Date</label><input id="date" type="date" class="w-full border rounded-lg p-2.5 bg-gray-50"></div>
          <div><label>Time</label><input id="time" type="time" class="w-full border rounded-lg p-2.5 bg-gray-50"></div>
          <div class="col-span-2 md:col-span-4"><label>Seller Name</label><input id="sellerName" type="text" class="w-full border rounded-lg p-2.5 bg-gray-50"></div>
        </div>

        <div>
          <div class="flex items-end justify-between mb-4">
            <h2 class="text-xl font-semibold">Item Details</h2>
            <div class="flex items-center gap-3">
              <label>Rows per page <input id="rowsPerPage" type="number" value="12" min="6" max="30" class="ml-2 w-20 border rounded-md p-2 text-right"></label>
              <button type="button" id="addRow" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg">+ Add Item</button>
            </div>
          </div>
          <table class="min-w-full">
            <thead>
              <tr class="border-b">
                <th>Sr.</th><th>D.P. No.</th><th>Goods Type</th><th>Units</th><th>Rate</th><th>Total</th><th></th>
              </tr>
            </thead>
            <tbody id="items-table-body"></tbody>
          </table>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 pt-8 border-t">
          <div class="space-y-3">
            <div class="flex justify-between"><label>Market Fee</label><input id="marketFee" type="number" step="0.01" class="border rounded-md p-2 w-32 text-right"></div>
            <div class="flex justify-between"><label>Commission A</label><input id="commissionA" type="number" step="0.01" class="border rounded-md p-2 w-32 text-right"></div>
            <div class="flex justify-between"><label>Commission B</label><input id="commissionB" type="number" step="0.01" class="border rounded-md p-2 w-32 text-right"></div>
            <div class="flex justify-between"><label>Advance</label><input id="advance" type="number" step="0.01" class="border rounded-md p-2 w-32 text-right"></div>
            <div class="flex justify-between"><label>Unloading</label><input id="unloading" type="number" step="0.01" class="border rounded-md p-2 w-32 text-right"></div>
          </div>
          <div class="bg-gray-50 rounded-lg p-4 space-y-3">
            <div class="flex justify-between"><span>Subtotal</span><span id="subTotal">0.00</span></div>
            <div class="flex justify-between"><label>Expenses</label><input id="expenses" type="number" step="0.01" class="border rounded-md p-2 w-32 text-right"></div>
            <div class="flex justify-between font-bold border-t pt-3"><span>Total Amount</span><span id="totalAmount" class="text-indigo-600">0.00</span></div>
            <div class="flex justify-between font-bold text-xl border-t pt-3"><span>Final Balance</span><span id="finalBalance" class="text-indigo-600">0.00</span></div>
          </div>
        </div>

        <div class="pt-6 flex gap-3 justify-end">
          <button type="button" id="previewBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white py-3 px-6 rounded-lg">Preview</button>
          <button type="button" id="printBtn" class="bg-green-600 hover:bg-green-700 text-white py-3 px-6 rounded-lg">Print</button>
        </div>
      </form>
    </div>
  </div>

  <div id="printRoot" class="flex flex-col items-center gap-6 p-6"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const body = document.getElementById('items-table-body');
      const addRow = document.getElementById('addRow');
      const previewBtn = document.getElementById('previewBtn');
      const printBtn = document.getElementById('printBtn');
      const printRoot = document.getElementById('printRoot');
      const rowsPerPageInput = document.getElementById('rowsPerPage');

      const INR = n => (Number(n)||0).toLocaleString('en-IN',{minimumFractionDigits:2, maximumFractionDigits:2});

      function createRow(){
        const row = document.createElement('tr');
        row.className='item-row border-b';
        row.innerHTML=`
          <td></td>
          <td><input type='text' class='dp-no border p-1 w-full rounded-md'></td>
          <td><input type='text' class='goods-type border p-1 w-full rounded-md'></td>
          <td><input type='number' class='units border p-1 w-full text-right rounded-md'></td>
          <td><input type='number' class='rate border p-1 w-full text-right rounded-md'></td>
          <td class='item-total text-right'>0.00</td>
          <td><button class='removeRow text-red-500'>X</button></td>`;
        body.appendChild(row);
        updateTotals();
      }

      function updateTotals(){
        let subtotal=0;
        document.querySelectorAll('.item-row').forEach((row,i)=>{
          const u=+row.querySelector('.units').value||0;
          const r=+row.querySelector('.rate').value||0;
          const total=u*r; subtotal+=total;
          row.querySelector('td').textContent=i+1;
          row.querySelector('.item-total').textContent=total.toFixed(2);
        });
        document.getElementById('subTotal').textContent=subtotal.toFixed(2);
        const d=["marketFee","expenses","commissionA","commissionB","advance","unloading"].reduce((a,id)=>a+(+document.getElementById(id).value||0),0);
        const net=subtotal-d;
        document.getElementById('totalAmount').textContent=net.toFixed(2);
        document.getElementById('finalBalance').textContent=INR(net);
      }

      function buildPages(){
        printRoot.innerHTML='';
        const items=[];
        document.querySelectorAll('.item-row').forEach(r=>{
          items.push({dp:r.querySelector('.dp-no').value,goods:r.querySelector('.goods-type').value,units:+r.querySelector('.units').value||0,rate:+r.querySelector('.rate').value||0,total:(+r.querySelector('.units').value||0)*(+r.querySelector('.rate').value||0)});
        });
        const rpp=Math.max(6,Math.min(30,+rowsPerPageInput.value||12));
        let carry=0;
        for(let i=0;i<items.length;i+=rpp){
          const page=document.createElement('div'); page.className='page';
          page.innerHTML=`<div class='header'><div class='company'>वक्रतुंड व्हेजिटेबल कंपनी</div><div class='sub'>Vakratunda Vegetable Company</div></div>`;
          const table=document.createElement('table'); table.className='receipt'; table.innerHTML='<thead><tr><th>Sr</th><th>D.P. No.</th><th>Goods</th><th>Units</th><th>Rate</th><th>Total</th></tr></thead><tbody></tbody>';
          const tb=table.querySelector('tbody');
          items.slice(i,i+rpp).forEach((r,j)=>{
            const tr=document.createElement('tr'); tr.innerHTML=`<td>${i+j+1}</td><td>${r.dp||''}</td><td>${r.goods||''}</td><td>${r.units}</td><td>₹ ${INR(r.rate)}</td><td>₹ ${INR(r.total)}</td>`; tb.appendChild(tr);
          });
          const pTotal=items.slice(i,i+rpp).reduce((s,r)=>s+r.total,0); carry+=pTotal;
          const tRow=document.createElement('tr'); tRow.className='total-row'; tRow.innerHTML=`<td colspan='5' style='text-align:right'>Page Total</td><td>₹ ${INR(pTotal)}</td>`; tb.appendChild(tRow);
          page.appendChild(table);
          const f=document.createElement('div'); f.className='footer-line'; f.innerHTML='<div>Checked by</div><div>Signature</div>'; page.appendChild(f);
          printRoot.appendChild(page);
        }
      }

      addRow.addEventListener('click',createRow);
      body.addEventListener('input',updateTotals);
      body.addEventListener('click',e=>{if(e.target.classList.contains('removeRow')){e.target.closest('tr').remove();updateTotals();}});
      document.getElementById('billForm').addEventListener('input',updateTotals);
      previewBtn.addEventListener('click',()=>{buildPages();printRoot.style.display='flex';window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});});
      printBtn.addEventListener('click',()=>{buildPages();window.print();});
    });
  </script>
</body>
</html>

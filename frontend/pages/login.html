<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Khatabook Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    background:#0f172a;
    font-family: Arial, sans-serif;
}

.glass{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.1);
}

.input{
    background:#111827;
    border:1px solid #374151;
    color:white;
}

.input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 2px rgba(37,99,235,0.3);
}

</style>

</head>

<body class="flex items-center justify-center min-h-screen p-4">

<!-- LOGIN CARD -->
<div class="glass w-full max-w-md rounded-3xl p-8 shadow-2xl">

    <!-- LOGO -->
    <div class="text-center mb-8">

        <h1 class="text-4xl font-bold text-blue-500">
            Khatabook
        </h1>

        <p class="text-gray-400 mt-2">
            Smart Business Ledger
        </p>

    </div>

    <!-- LOGIN FORM -->
    <div id="loginBox">

        <h2 class="text-2xl font-bold text-white mb-6">
            Login
        </h2>

        <!-- MOBILE -->
        <input
            type="text"
            id="loginPhone"
            placeholder="Mobile Number"
            class="input w-full p-4 rounded-2xl mb-4"
        >

        <!-- PASSWORD -->
        <input
            type="password"
            id="loginPassword"
            placeholder="Password"
            class="input w-full p-4 rounded-2xl mb-6"
        >

        <!-- LOGIN BUTTON -->
        <button
            onclick="login()"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl text-lg font-semibold transition">

            Log in

        </button>

        <!-- SWITCH -->
        <div class="text-center mt-6">

            <button
                onclick="showRegister()"
                class="text-blue-400 hover:text-blue-300 font-semibold">

                Create new account

            </button>

        </div>

    </div>

    <!-- REGISTER FORM -->
    <div id="registerBox" class="hidden">

        <h2 class="text-2xl font-bold text-white mb-6">
            Register
        </h2>

        <!-- MOBILE -->
        <input
            type="text"
            id="registerPhone"
            placeholder="Mobile Number"
            class="input w-full p-4 rounded-2xl mb-4"
        >

        <!-- PASSWORD -->
        <input
            type="password"
            id="registerPassword"
            placeholder="Password"
            class="input w-full p-4 rounded-2xl mb-4"
        >

        <!-- CONFIRM PASSWORD -->
        <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
            class="input w-full p-4 rounded-2xl mb-6"
        >

        <!-- REGISTER BUTTON -->
        <button
            onclick="register()"
            class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl text-lg font-semibold transition">

            Register

        </button>

        <!-- SWITCH -->
        <div class="text-center mt-6">

            <button
                onclick="showLogin()"
                class="text-blue-400 hover:text-blue-300 font-semibold">

                Already have an account?

            </button>

        </div>

    </div>

</div>

<script>

// ================= AUTO LOGIN =================
const token =
    localStorage.getItem("token");

if (token) {

    window.location.href =
        "khata.html";
}



// ================= SHOW REGISTER =================
function showRegister() {

    document.getElementById("loginBox")
        .classList.add("hidden");

    document.getElementById("registerBox")
        .classList.remove("hidden");
}



// ================= SHOW LOGIN =================
function showLogin() {

    document.getElementById("registerBox")
        .classList.add("hidden");

    document.getElementById("loginBox")
        .classList.remove("hidden");
}



// ================= REGISTER =================
async function register() {

    const phone =
        document.getElementById("registerPhone").value;

    const password =
        document.getElementById("registerPassword").value;

    const confirmPassword =
        document.getElementById("confirmPassword").value;

    // VALIDATION
    if (!phone || !password || !confirmPassword) {

        alert("Fill all fields");

        return;
    }

    // PASSWORD MATCH
    if (password !== confirmPassword) {

        alert("Passwords do not match");

        return;
    }

    try {

        const res = await fetch(

            "/api/auth/register",

            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    phone,
                    password
                })
            }
        );

        const data =
            await res.json();

        alert(data.message);

        if (data.success) {
            // SAVE TOKEN (auto-login after registration)
            localStorage.setItem(
                "token",
                data.token
            );

            // SAVE USER
            localStorage.setItem(
                "user",
                JSON.stringify(data.user)
            );

            // SAVE PROFILE (for fast loading)
            if (data.profile) {
                localStorage.setItem(
                    "userProfile",
                    JSON.stringify(data.profile)
                );
            }

            showLogin();
        }

    } catch(err) {

        console.error(err);

        alert("Registration failed");
    }
}



// ================= LOGIN =================
async function login() {

    const phone =
        document.getElementById("loginPhone").value;

    const password =
        document.getElementById("loginPassword").value;

    if (!phone || !password) {

        alert("Fill all fields");

        return;
    }

    try {

        const res = await fetch(

            "/api/auth/login",

            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    phone,
                    password
                })
            }
        );

        const data =
            await res.json();

        if (!data.success) {

            alert(data.message);

            return;
        }

        // SAVE TOKEN
        localStorage.setItem(
            "token",
            data.token
        );

        // SAVE USER
        localStorage.setItem(
            "user",
            JSON.stringify(data.user)
        );

        // SAVE PROFILE (for fast loading)
        if (data.profile) {
            localStorage.setItem(
                "userProfile",
                JSON.stringify(data.profile)
            );
        }

        window.location.href =
            "khata.html";

    } catch(err) {

        console.error(err);

        alert("Login failed");
    }
}

</script>

</body>
</html>

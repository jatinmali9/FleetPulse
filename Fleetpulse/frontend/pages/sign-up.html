<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign Up - Fleet Pulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-gray-100">
  <div class="bg-white p-8 rounded-lg shadow max-w-lg w-full">
    <h1 class="text-2xl font-bold text-blue-600">Create account</h1>
    <form id="signupForm" class="space-y-4">
      <input id="fullName" placeholder="Full name" class="w-full p-2 border rounded" />
      <input id="email" type="email" placeholder="Email" class="w-full p-2 border rounded" />
      <input id="password" type="password" placeholder="Password" class="w-full p-2 border rounded" />
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded">Register</button>
    </form>
  </div>
  <script>
    document.getElementById('signupForm')?.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const fullName=document.getElementById('fullName').value, email=document.getElementById('email').value, password=document.getElementById('password').value;
      const res=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:fullName,email,password})});
      const data=await res.json();
      if(res.ok){localStorage.setItem('token',data.token); window.location.href='/profile.html';}else alert(data.message||'Registration failed');
    });
  </script>
</body>
</html>

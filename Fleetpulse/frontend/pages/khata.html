<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FleetPulse KhataBook</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- 🔒 LOGIN CHECK -->
<script>

const authToken =
    localStorage.getItem("token");

if (!authToken) {

    window.location.href =
        "login.html";
}

</script>

<!-- HEADER -->
<header class="bg-blue-600 text-white shadow-lg">

    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

        <div>

            <h1 class="text-2xl font-bold">
                📒 FleetPulse KhataBook
            </h1>

            <p class="text-sm text-blue-100">
                Customer Ledger Management
            </p>

        </div>

        <!-- USER INFO -->
        <div class="flex items-center gap-4">

            <div id="userInfo"
                class="bg-white/20 px-4 py-2 rounded-lg text-sm">
            </div>

            <!-- LOGOUT -->
            <button
                onclick="logout()"
                class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg font-semibold">

                Logout

            </button>

        </div>

    </div>

</header>

<!-- MAIN -->
<main class="max-w-6xl mx-auto p-6">

    <!-- CARD -->
    <div class="bg-white rounded-2xl shadow-lg p-6">

        <div class="flex justify-between items-center mb-6">

            <h2 class="text-2xl font-bold text-gray-800">
                Customers
            </h2>

            <button
                onclick="openModal()"
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg">

                + Add Customer

            </button>

        </div>

        <!-- SEARCH -->
        <input
            type="text"
            id="searchInput"
            placeholder="Search customer..."
            class="w-full border p-3 rounded-lg mb-6"
            onkeyup="searchCustomer()"
        >

        <!-- TABLE -->
        <div class="overflow-x-auto rounded-2xl border border-gray-200 bg-white">

    <table class="w-full">

        <!-- HEADER -->
        <thead class="bg-gray-100 border-b">

            <tr>

                <th class="text-left px-6 py-4 text-gray-700 font-bold text-lg">
                    NAME
                </th>

                <th class="text-right px-6 py-4 text-gray-700 font-bold text-lg">
                    AMOUNT
                </th>

            </tr>

        </thead>

        <!-- BODY -->
        <tbody id="customerTable"
            class="divide-y divide-gray-100">

        </tbody>

    </table>

</div>

    </div>

</main>

<!-- MODAL -->
<!-- ADD PARTY MODAL -->
<div id="customerModal"
class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">

        <!-- HEADER -->
        <div class="flex justify-between items-center px-6 py-4 border-b">

            <h2 class="text-3xl font-bold text-gray-800">
                Add New Party
            </h2>

            <button onclick="closeModal()"
            class="text-3xl text-gray-400 hover:text-red-500">
                ×
            </button>

        </div>

        <!-- BODY -->
        <div class="p-6 space-y-6">

            <!-- PARTY NAME -->
            <div>

                <label class="block text-gray-700 font-semibold mb-2">
                    Party Name
                </label>

                <input
                    type="text"
                    id="customerName"
                    placeholder="Enter Party Name"
                    class="w-full border border-gray-300 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500"
                >

            </div>

            <!-- PHONE -->
            <div>

                <div class="flex justify-between mb-2">

                    <label class="text-gray-700 font-semibold">
                        Phone Number
                    </label>

                    <span class="text-gray-400 text-sm">
                        optional
                    </span>

                </div>

                <div class="flex border border-gray-300 rounded-2xl overflow-hidden">

                    <span class="px-4 flex items-center bg-gray-100 text-gray-600">
                        +91
                    </span>

                    <input
                        type="text"
                        id="customerPhone"
                        placeholder="Enter Phone Number"
                        class="w-full p-4 outline-none"
                    >

                </div>

            </div>

            <!-- OPENING BALANCE -->
            <div>

                <div class="flex justify-between mb-2">

                    <label class="text-gray-700 font-semibold">
                        Opening Balance
                    </label>

                    <span class="text-gray-400 text-sm">
                        optional
                    </span>

                </div>

                <div class="flex border border-blue-500 rounded-2xl overflow-hidden">

                    <div class="flex items-center px-4 bg-white text-gray-600">
                        ₹
                    </div>

                    <input
                        type="number"
                        id="openingBalance"
                        placeholder="Enter amount"
                        class="w-full p-4 outline-none"
                    >

                    <select
                        id="balanceType"
                        class="px-4 outline-none text-red-500 font-semibold border-l">

                        <option value="gave">
                            You Gave
                        </option>

                        <option value="got">
                            You Got
                        </option>

                    </select>

                </div>

            </div>

            <!-- CUSTOMER / SUPPLIER -->
            <div>

                <label class="block text-gray-700 font-semibold mb-3">
                    Who are they?
                </label>

                <div class="flex gap-6">

                    <label class="flex items-center gap-2 text-lg">

                        <input
                            type="radio"
                            name="partyType"
                            value="Customer"
                            checked
                            class="accent-blue-600"
                        >

                        Customer

                    </label>

                    <label class="flex items-center gap-2 text-lg">

                        <input
                            type="radio"
                            name="partyType"
                            value="Supplier"
                            class="accent-blue-600"
                        >

                        Supplier

                    </label>

                </div>

            </div>

            <!-- GST & ADDRESS -->
            <details class="border-t pt-4">

                <summary class="cursor-pointer text-blue-600 font-semibold text-lg">
                    Add GSTIN & Address (Optional)
                </summary>

                <div class="mt-4 space-y-4">

                    <input
                        type="text"
                        id="gstin"
                        placeholder="Enter GSTIN"
                        class="w-full border border-gray-300 rounded-2xl p-4 outline-none"
                    >

                    <textarea
                        id="address"
                        placeholder="Enter Address"
                        class="w-full border border-gray-300 rounded-2xl p-4 outline-none"
                    ></textarea>

                </div>

            </details>

            <!-- BUTTONS -->
            <div class="flex gap-4 pt-2">

                <button
                    onclick="saveCustomer()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl text-lg font-semibold">

                    Save Party

                </button>

                <button
                    onclick="closeModal()"
                    class="w-full bg-gray-200 hover:bg-gray-300 py-4 rounded-2xl text-lg font-semibold">

                    Cancel

                </button>

            </div>

        </div>

    </div>

</div>

<script>

// ================= USER INFO =================
const user =
    JSON.parse(localStorage.getItem("user"));

document.getElementById("userInfo")
    .innerHTML =
        `📱 ${user?.phone || "User"}`;



// ================= CUSTOMER ARRAY =================
let customers = [];



// ================= LOAD CUSTOMERS =================
async function loadCustomers() {

    try {

        const res = await fetch(
            "/api/customer/all"
        );

        customers = await res.json();

        renderCustomers();

    } catch(err) {

        console.error(err);

        alert("Failed to load customers");
    }
}

loadCustomers();



// ================= RENDER CUSTOMERS =================
// ================= RENDER CUSTOMERS =================
function renderCustomers(data = customers) {

    const table =
        document.getElementById("customerTable");

    table.innerHTML = "";

    if (data.length === 0) {

        table.innerHTML = `

            <tr>

                <td colspan="2"
                class="text-center py-10 text-gray-500 text-lg">

                    No Customers Found

                </td>

            </tr>
        `;

        return;
    }

    data.forEach(c => {

        // ================= USER ICON =================
        const firstLetter =
            c.name.charAt(0).toUpperCase();



     // ================= NET TOTALS =================

// TRANSACTION TOTALS
let totalGive =
    Number(c.totalGive || 0);

let totalGet =
    Number(c.totalGet || 0);


// ADD OPENING BALANCE ONLY ONCE



        // ================= NET =================
        const net =
    totalGive - totalGet;



        // ================= BALANCE UI =================
        let amountColor = "";
        let amountText = "";
        let amountSymbol = "";



        // RED = YOU'LL GIVE
        // CUSTOMER SHOULD PAY YOU
if (net > 0) {

    amountColor =
        "text-green-500";

    amountText =
        "YOU'LL GET";

    amountSymbol = "";


// YOU SHOULD PAY CUSTOMER
} else if (net < 0) {

    amountColor =
        "text-red-500";

    amountText =
        "YOU'LL GIVE";

    amountSymbol = "-";


// SETTLED
} else {

    amountColor =
        "text-gray-500";

    amountText =
        "SETTLED";

    amountSymbol = "";
}



        // ================= FORMAT =================
        const amount =
            Math.abs(net)
            .toLocaleString("en-IN");



        // ================= ROW =================
        table.innerHTML += `

<tr
onclick="openCustomer('${c._id}')"
class="hover:bg-blue-50 transition-all duration-300 cursor-pointer border-b">

    <!-- CUSTOMER -->
    <td class="px-6 py-5">

        <div class="flex items-center gap-4">

            <!-- ICON -->
            <div class="h-14 w-14 rounded-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white flex items-center justify-center text-2xl font-bold shadow-lg">

                ${firstLetter}

            </div>

            <!-- INFO -->
            <div>

                <h3 class="font-bold text-lg text-gray-800 uppercase tracking-wide">

                    ${c.name}

                </h3>

                <p class="text-gray-500 text-sm mt-1">

                    ${c.phone || "No Phone"}

                </p>

            </div>

        </div>

    </td>

    <!-- BALANCE -->
    <td class="px-6 py-5 text-right">

        <h2 class="${amountColor} text-3xl font-bold">

            ${amountSymbol}₹${amount}

        </h2>

        <p class="text-gray-400 text-sm font-semibold tracking-widest mt-1">

            ${amountText}

        </p>

    </td>

</tr>
`;
    });
}
// ================= OPEN MODAL =================
function openModal() {

    document.getElementById("customerModal")
        .classList.remove("hidden");
}



// ================= CLOSE MODAL =================
function closeModal() {

    document.getElementById("customerModal")
        .classList.add("hidden");
}



// ================= SAVE CUSTOMER =================
async function saveCustomer() {

    const data = {

        name:
            document.getElementById("customerName").value,

        phone:
            document.getElementById("customerPhone").value,

        openingBalance:
            document.getElementById("openingBalance").value,

        balanceType:
            document.getElementById("balanceType").value,

        partyType:
            document.querySelector(
                'input[name="partyType"]:checked'
            ).value,

        gstin:
            document.getElementById("gstin").value,

        address:
            document.getElementById("address").value
    };

    try {

        const res = await fetch(

            "/api/customer/add",

            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify(data)
            }
        );

        const result =
            await res.json();

        // ERROR
        if (!res.ok) {

            alert(result.message);

            return;
        }

        alert("Customer Added");

        loadCustomers();

        closeModal();

    } catch(err) {

        console.error(err);

        alert("Failed to save customer");
    }
}



// ================= SEARCH =================
function searchCustomer() {

    const value =
        document.getElementById("searchInput")
        .value.toLowerCase();

    const filtered =
        customers.filter(c =>

            c.name.toLowerCase().includes(value)
            ||

            c.phone.includes(value)
        );

    renderCustomers(filtered);
}
// ================= OPEN CUSTOMER =================
function openCustomer(id) {

    console.log("OPEN:", id);

    window.location.href =
        `customer-details.html?id=${id}`;
}



// ================= LOGOUT =================
async function logout() {
    try {
        await fetch('/api/auth/logout', {
            method: 'POST',
            credentials: 'include'
        });
    } catch (error) {
        console.error('Logout failed:', error);
    }

    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login</title>
<script src="https://cdn.tailwindcss.com"></script></head>
<body class="flex items-center justify-center min-h-screen p-4 bg-slate-900 text-white">
  <div class="w-full max-w-md bg-slate-800 p-6 rounded-xl">
    <h1 class="text-2xl font-bold">Login</h1>
    <input id="loginPhone" placeholder="Mobile" class="w-full p-3 mt-4 rounded bg-slate-700" />
    <input id="loginPassword" type="password" placeholder="Password" class="w-full p-3 mt-4 rounded bg-slate-700" />
    <button id="btnLogin" class="w-full bg-blue-600 py-3 mt-4 rounded">Log in</button>
  </div>
  <script>
    document.getElementById('btnLogin')?.addEventListener('click', async ()=>{
      const phone=document.getElementById('loginPhone').value, password=document.getElementById('loginPassword').value;
      const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,password})});
      const data=await res.json(); if(data.success){localStorage.setItem('token',data.token); window.location.href='/khata.html'} else alert(data.message||'Login failed');
    });
  </script>
</body>
</html>

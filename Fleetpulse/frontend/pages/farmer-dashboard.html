<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farmer Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',sans-serif}.gradient-bg{background:linear-gradient(135deg,#f8fafc 0%,#e2e8f0 100%);position:relative;overflow-x:hidden}.gradient-bg::before{content:'';position:absolute;top:0;left:0;right:0;height:60vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);clip-path:polygon(0 0,100% 0,100% 85%,0 100%);z-index:0}.navbar-shape{background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:0 0 30px 30px;box-shadow:0 10px 30px rgba(0,0,0,0.1);position:sticky;top:0;z-index:50}.content-wrapper{position:relative;z-index:1}.btn-primary{background:linear-gradient(135deg,#3b82f6 0%,#1d4ed8 100%)}.btn-primary:hover{background:linear-gradient(135deg,#1d4ed8 0%,#1e40af 100%)}</style>
</head>

<body class="gradient-bg min-h-screen">

<!-- NAVBAR -->
<header class="navbar-shape">
	<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
		<div class="flex justify-between items-center py-4">
			<div class="flex items-center">
				<div class="flex items-center">
					<div class="h-10 w-10 rounded-xl bg-blue-600 flex items-center justify-center mr-3">
						<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
						</svg>
					</div>
					<h1 class="text-xl font-bold text-gray-800">Fleet Pulse</h1>
				</div>

				<nav class="hidden md:ml-10 md:flex space-x-8">
					<a href="/enterprise.html" class="text-blue-600 font-semibold px-3 py-2 text-sm rounded-lg bg-blue-50">Enterprise</a>
					<a href="/analytics.html" class="text-gray-600 hover:text-blue-600 px-3 py-2 text-sm rounded-lg hover:bg-gray-100">Reports</a>
					<a href="/support.html" class="text-gray-600 hover:text-blue-600 px-3 py-2 text-sm rounded-lg hover:bg-gray-100">Settings</a>
				</nav>
			</div>

			<div class="flex items-center space-x-4">
				<button class="text-gray-600 hover:text-blue-600 transition-colors">
					<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
					</svg>
				</button>
				<div class="h-10 w-10 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center shadow-md">
					<span class="text-white font-semibold">JD</span>
				</div>
			</div>
		</div>
	</div>
</header>

<!-- MAIN -->
<main class="content-wrapper max-w-7xl mx-auto px-4 py-12">
	<div class="text-center mb-12">
		<h1 class="text-4xl font-bold text-white">🌾 Farmer Dashboard</h1>
		<p class="text-green-100 mt-2">Manage all farmers and products efficiently</p>
	</div>

	<div class="bg-white p-8 rounded-2xl shadow-lg">
		<div class="flex justify-between items-center mb-6">
			<h2 class="text-xl font-semibold text-gray-800">All Farmers</h2>
			<button onclick="goToForm()" class="btn-primary text-white px-4 py-2 rounded-lg">➕ Add Farmer</button>
		</div>

		<div class="flex gap-4 mb-4">
		  <input id="searchInput" placeholder="Search farmer..." class="border px-3 py-2 rounded w-1/2">
		  <select id="categoryFilter" class="border px-3 py-2 rounded"><option value="all">All</option><option value="Perishable">Perishable</option><option value="Non-Perishable">Non-Perishable</option></select>
		  <select id="productFilter" class="border px-3 py-2 rounded"><option value="all">All Products</option></select>
		  <button onclick="loadFarmers()" class="bg-gray-200 px-4 py-2 rounded">Reset</button>
		</div>

		<div class="overflow-x-auto"><table class="w-full"><thead class="bg-gray-100"><tr><th class="p-3">Name</th><th class="p-3">Contact</th><th class="p-3">Location</th><th class="p-3">Product</th><th class="p-3">Category</th></tr></thead><tbody id="farmerTable" class="text-center"></tbody></table></div>
	</div>
</main>

<!-- Load dashboard JS from assets -->
<script>
function goToForm(){ window.location.href = '/farmerregistration.html'; }
</script>
<script src="/assets/js/dashboard.js"></script>

</body>
</html>
